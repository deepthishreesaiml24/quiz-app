{% extends "base.html" %}
{% block title %}Register — Quiz Master{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="auth-logo-icon">✨</span>
    </div>
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-subtitle">Join thousands of learners today!</p>

    <form method="POST">
      <div class="form-group">
        <label class="form-label">👤 Username</label>
        <input name="username" type="text" class="form-control" placeholder="Choose a username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">📧 Email</label>
        <input name="email" type="email" class="form-control" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">🔒 Password</label>
        <input name="password" type="password" class="form-control" placeholder="Create a password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:0.5rem">
        🌟 Create Account
      </button>
    </form>

    <div class="auth-footer" style="margin-top:1.2rem">
      Already have an account?
      <a href="{{ url_for('login') }}" class="auth-link">Sign in →</a>
    </div>
  </div>
</div>
{% endblock %}
